<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SF.AI — Chat</title>
<style>
  :root {
    --bg: #f6f8fb;
    --surface: #ffffff;
    --panel: #f1f5f9;
    --panel-strong: #e7edf4;
    --line: #cbd5e1;
    --text: #172033;
    --muted: #5f6f84;
    --soft: #eef4ff;
    --user: #dbeafe;
    --bot:  #ffffff;
    --accent: #1769e0;
    --accent-strong: #0f4fb4;
    --accent-soft: #eaf2ff;
    --warn: #9a5b13;
    --ok: #176b43;
    --danger: #a63b3b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "SF Pro Text",
                 "Segoe UI", "Cairo", "Tajawal", "Noto Naskh Arabic", sans-serif;
    font-size: 17px;
    line-height: 1.75;
  }
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 1280px;
    margin: 0 auto;
    border-inline: 1px solid var(--line);
    background: var(--surface);
    box-shadow: 0 18px 50px rgba(23, 32, 51, 0.08);
  }
  header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--surface);
  }
  header h1 {
    margin: 0; font-size: 24px; font-weight: 800; letter-spacing: 0;
  }
  header .sub { color: var(--muted); font-size: 14px; margin-top: 2px; }
  .badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .badge {
    background: var(--accent-soft); border: 1px solid #bfd6ff;
    padding: 7px 11px; border-radius: 999px; font-size: 13px; color: #21466f;
    font-weight: 700;
  }
  .icon-btn {
    background: var(--surface); color: var(--accent-strong);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 7px 12px; font-size: 13px; cursor: pointer; font-family: inherit;
    font-weight: 800;
  }
  .icon-btn:hover { color: #ffffff; background: var(--accent); border-color: var(--accent); }
  main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    overflow: hidden;
    background: var(--bg);
  }
  .messages {
    overflow-y: auto;
    padding: 24px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .msg {
    max-width: min(78%, 760px);
    padding: 14px 18px;
    border-radius: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    border: 1px solid var(--line);
    color: var(--text);
    box-shadow: 0 8px 24px rgba(23, 32, 51, 0.06);
  }
  .msg.user { align-self: flex-end; background: var(--user); border-color: #b8d4fb; }
  .msg.bot  { align-self: flex-start; background: var(--bot); }
  .msg .meta {
    color: var(--muted); font-size: 13px; margin-top: 10px;
    border-top: 1px solid var(--line);
    padding-top: 8px;
  }
  .msg .time { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
  .sidebar {
    background: var(--surface);
    border-inline-start: 1px solid var(--line);
    padding: 18px;
    overflow-y: auto;
    font-size: 15px;
  }
  .sidebar h2 {
    margin: 0 0 10px; font-size: 15px; color: var(--text);
    font-weight: 800;
  }
  .kv { display: grid; grid-template-columns: 110px minmax(0, 1fr); gap: 8px 12px; }
  .kv div:nth-child(odd) { color: var(--muted); font-weight: 700; }
  .kv code {
    display: block;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 5px 8px;
    border-radius: 8px;
    font-size: 14px;
    white-space: normal;
    overflow-wrap: anywhere;
  }
  .signals { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .sig {
    background: var(--panel); border: 1px solid var(--line);
    padding: 5px 9px; border-radius: 999px; font-size: 13px; color: var(--text);
    font-weight: 700;
  }
  .sig.phrase { color: var(--ok); border-color: #9fd0b9; background: #eefaf4; }
  .sig.keyword { color: var(--accent-strong); border-color: #b9d3ff; background: #eef5ff; }
  .sig.dialect_alias { color: var(--warn); border-color: #e6cfa4; background: #fff7e7; }
  .divider { height: 1px; background: var(--line); margin: 18px 0; }
  footer {
    border-top: 1px solid var(--line);
    padding: 16px 18px;
    display: flex; gap: 8px;
    background: var(--surface);
  }
  textarea {
    flex: 1; resize: none; min-height: 54px; max-height: 220px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 13px 15px; font-family: inherit; font-size: 17px;
    line-height: 1.5;
  }
  textarea:focus { outline: 3px solid #bfd6ff; border-color: var(--accent); }
  button {
    background: var(--accent); color: #ffffff; border: 0; border-radius: 12px;
    padding: 0 22px; font-weight: 800; font-size: 16px; cursor: pointer;
    min-height: 54px;
  }
  button:hover { background: var(--accent-strong); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; border: 1px solid var(--line); margin-inline-end: 4px;
  }
  .pill.ok { color: var(--ok); }
  .pill.warn { color: var(--warn); }
  .empty {
    color: var(--muted); padding: 32px 18px;
    text-align: center;
    font-size: 17px;
    border: 1px dashed var(--line);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.7);
  }
  #corrections, #safety-flags {
    font-size: 14px !important;
    color: var(--text) !important;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px;
    min-height: 38px;
  }
  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
    .sidebar {
      border-inline-start: 0;
      border-top: 1px solid var(--line);
      max-height: 42vh;
    }
    .messages { padding: 16px; }
    .msg { max-width: 94%; }
    header h1 { font-size: 21px; }
    footer { padding: 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>SF.AI — محادثة</h1>
      <div class="sub" id="phase-line">جاري التحميل…</div>
    </div>
    <div class="badges">
      <span class="badge" id="session-badge">جلسة: —</span>
      <span class="badge" id="sov-badge">سيادي ✓</span>
      <button class="icon-btn" id="clear-btn" title="مسح المحادثة">مسح</button>
    </div>
  </header>

  <main>
    <section class="messages" id="messages">
      <div class="empty">المحادثة جاهزة. اكتب رسالتك في الأسفل.</div>
    </section>
    <aside class="sidebar">
      <h2>تشخيص آخر رسالة</h2>
      <div class="kv" id="diag">
        <div>المجال</div><div><code>—</code></div>
        <div>النية</div><div><code>—</code></div>
        <div>الثقة</div><div><code>—</code></div>
        <div>المسار</div><div><code>—</code></div>
        <div>المولّد</div><div><code>—</code></div>
        <div>الذاكرة</div><div><code>—</code></div>
        <div>سبب التوجيه</div><div><code>—</code></div>
        <div>اللغة</div><div><code>—</code></div>
        <div>اللهجة</div><div><code>—</code></div>
        <div>safety</div><div><code>—</code></div>
        <div>fallback</div><div><code>—</code></div>
      </div>
      <div class="divider"></div>
      <h2>الإشارات</h2>
      <div class="signals" id="signals"></div>
      <div class="divider"></div>
      <h2>تصحيحات إملائية / لهجية</h2>
      <div id="corrections" style="font-size:12px; color: var(--muted);">—</div>
      <div class="divider"></div>
      <h2>flags السلامة</h2>
      <div id="safety-flags" style="font-size:12px; color: var(--muted);">—</div>
    </aside>
  </main>

  <footer>
    <textarea id="input"
              placeholder="اكتب رسالتك هنا…"
              rows="1"></textarea>
    <button id="send">إرسال</button>
  </footer>
</div>

<script>
(function () {
  const SESSION_ID = (() => {
    let id = localStorage.getItem("sf_session_id");
    if (!id) {
      id = "sf-" + Math.random().toString(36).slice(2, 10);
      localStorage.setItem("sf_session_id", id);
    }
    return id;
  })();
  document.getElementById("session-badge").textContent = "جلسة: " + SESSION_ID;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const diagEl = document.getElementById("diag");
  const signalsEl = document.getElementById("signals");
  const correctionsEl = document.getElementById("corrections");
  const safetyEl = document.getElementById("safety-flags");
  const phaseEl = document.getElementById("phase-line");

  // Fetch phase info.
  fetch("/system/status").then(r => r.json()).then(data => {
    phaseEl.textContent = data.current_phase + " — " + data.env;
  }).catch(() => {
    phaseEl.textContent = "تعذر جلب /system/status";
  });

  function el(tag, opts = {}) {
    const e = document.createElement(tag);
    if (opts.className) e.className = opts.className;
    if (opts.text) e.textContent = opts.text;
    if (opts.html) e.innerHTML = opts.html;
    return e;
  }

  function clearEmpty() {
    const empty = messagesEl.querySelector(".empty");
    if (empty) empty.remove();
  }

  function nowHHMM() {
    const d = new Date();
    return d.toLocaleTimeString("ar-SA", { hour: "2-digit", minute: "2-digit" });
  }

  function appendMessage(role, text) {
    clearEmpty();
    const m = el("div", { className: "msg " + role });
    const time = el("div", { className: "time", text: nowHHMM() });
    m.appendChild(time);
    const body = el("div");
    body.textContent = text;
    m.appendChild(body);
    m._body = body;
    messagesEl.appendChild(m);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return m;
  }

  function setMessageText(msgEl, text) {
    if (msgEl._body) {
      msgEl._body.textContent = text;
    } else {
      msgEl.textContent = text;
    }
  }

  function showEmpty() {
    messagesEl.innerHTML = '<div class="empty">المحادثة جاهزة. اكتب رسالتك في الأسفل.</div>';
  }

  function escapeText(t) { return (t || "").toString(); }

  function readableValue(key, value) {
    const v = (value || "").toString();
    if (key === "generator") {
      if (v === "template") return "قالب آمن";
      if (v === "sf_10m_v0_1") return "نموذج SF-10M";
    }
    if (key === "rag") {
      if (v === "used") return "مستخدمة";
      if (v === "not_used") return "غير مستخدمة";
    }
    if (key === "dispatch") {
      if (v === "module:chat") return "وحدة المحادثة";
      if (v === "composer") return "المؤلف الآمن";
      if (v === "composer_no_module") return "المؤلف بدون وحدة";
    }
    if (key === "domain") {
      const map = {
        chat: "محادثة",
        coding: "برمجة",
        data: "بيانات",
        medical: "طبي",
        legal: "قانوني",
        finance: "مالي",
        religion: "ديني",
        security: "أمني"
      };
      return map[v] || v || "—";
    }
    return v || "—";
  }

  function setDiag(body) {
    const rows = diagEl.querySelectorAll("div");
    const pairs = [
      ["المجال", readableValue("domain", body.domain)],
      ["النية", body.intent || "—"],
      ["الثقة", body.confidence != null ? body.confidence.toFixed(2) : "—"],
      ["المسار", readableValue("dispatch", body.dispatch)],
      ["المولّد", readableValue("generator", body.generator || (body.debug && body.debug.generator) || "template")],
      ["الذاكرة", readableValue("rag", body.rag || (body.debug && body.debug.rag) || "not_used")],
      ["سبب التوجيه", body.route_reason || "—"],
      ["اللغة", (body.debug && body.debug.language) || "—"],
      ["اللهجة", (body.debug && body.debug.dialect) || "—"],
      ["safety", body.requires_safety ? "نعم" : "لا"],
      ["fallback", body.fallback_used ? "نعم" : "لا"],
    ];
    let idx = 1;
    pairs.forEach((p) => {
      rows[idx].innerHTML = "<code>" + escapeText(p[1]) + "</code>";
      idx += 2;
    });

    // Signals.
    signalsEl.innerHTML = "";
    (body.matched_signals || []).forEach((s) => {
      const kind = (s.split(":")[0] || "").trim();
      const chip = el("span", { className: "sig " + kind, text: s });
      signalsEl.appendChild(chip);
    });
    if (!body.matched_signals || body.matched_signals.length === 0) {
      signalsEl.appendChild(el("span", { className: "sig", text: "(لا إشارات)" }));
    }

    // Corrections + safety flags from debug.
    const corr = (body.debug && body.debug.corrections) || "";
    correctionsEl.textContent = corr ? corr : "—";
    const safe = (body.debug && body.debug.safety_flags) || "";
    safetyEl.textContent = safe ? safe : "—";
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    sendBtn.disabled = true;
    appendMessage("user", text);
    inputEl.value = "";
    const placeholder = appendMessage("bot", "…");
    try {
      const r = await fetch("/chat/message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: SESSION_ID }),
      });
      if (!r.ok) {
        setMessageText(placeholder, "خطأ: HTTP " + r.status);
        return;
      }
      const body = await r.json();
      setMessageText(placeholder, body.response || "(لا رد)");
      const meta = el("div", { className: "meta" });
      meta.textContent =
        readableValue("domain", body.domain) +
        " / " + (body.intent || "?") +
        " · ثقة " + (body.confidence != null ? body.confidence.toFixed(2) : "—") +
        " · " + readableValue("dispatch", body.dispatch) +
        " · مولّد: " + readableValue("generator", body.generator || "template") +
        " · ذاكرة: " + readableValue("rag", body.rag || "not_used");
      placeholder.appendChild(meta);
      setDiag(body);
    } catch (e) {
      setMessageText(placeholder, "تعذر الاتصال بالخادم: " + e.message);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  function clearChat() {
    showEmpty();
    // Reset diag panel.
    const blanks = diagEl.querySelectorAll("div");
    for (let i = 1; i < blanks.length; i += 2) {
      blanks[i].innerHTML = "<code>—</code>";
    }
    signalsEl.innerHTML = "";
    correctionsEl.textContent = "—";
    safetyEl.textContent = "—";
    // Rotate to a fresh session so the server's short-term memory starts over.
    const newId = "sf-" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("sf_session_id", newId);
    document.getElementById("session-badge").textContent = "جلسة: " + newId;
    // Soft reload so SESSION_ID variable updates.
    location.reload();
  }
  document.getElementById("clear-btn").addEventListener("click", () => {
    if (confirm("هل تريد مسح المحادثة وبدء جلسة جديدة؟")) clearChat();
  });

  sendBtn.addEventListener("click", send);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  // Auto-grow textarea.
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(200, inputEl.scrollHeight) + "px";
  });

  inputEl.focus();
})();
</script>
</body>
</html>
