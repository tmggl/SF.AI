# SF.AI — docker-compose skeleton
#
# هذا skeleton لمرحلة Phase 1.
# - api: FastAPI backend (Phase 1+)
# - postgres: تخزين علائقي (Phase 1+ كحاجة)
# - redis: تخزين مؤقت / sessions (Phase 1+ كحاجة)
# - qdrant: vector store (Phase 8)
# - web: frontend Next.js (Phase 9)
#
# لا تبدأ خدمات ثقيلة الآن. ابدأ فقط بما تحتاجه المرحلة الحالية.
# قيم البيئة من ملف .env (انسخ .env.example إلى .env).

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: sfai/api:dev
    container_name: sfai-api
    env_file: .env
    ports:
      - "${SF_API_PORT:-8000}:8000"
    volumes:
      - ./:/app
    working_dir: /app
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis
    profiles: ["api", "full"]

  postgres:
    image: postgres:16-alpine
    container_name: sfai-postgres
    environment:
      POSTGRES_USER: ${SF_POSTGRES_USER:-sfai}
      POSTGRES_PASSWORD: ${SF_POSTGRES_PASSWORD:-change_me_locally}
      POSTGRES_DB: ${SF_POSTGRES_DB:-sfai}
    ports:
      - "${SF_POSTGRES_PORT:-5432}:5432"
    volumes:
      - .docker-data/postgres:/var/lib/postgresql/data
    profiles: ["api", "full"]

  redis:
    image: redis:7-alpine
    container_name: sfai-redis
    ports:
      - "${SF_REDIS_PORT:-6379}:6379"
    volumes:
      - .docker-data/redis:/data
    profiles: ["api", "full"]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sfai-qdrant
    ports:
      - "${SF_QDRANT_PORT:-6333}:6333"
    volumes:
      - .docker-data/qdrant:/qdrant/storage
    profiles: ["rag", "full"]

  web:
    build:
      context: ./apps/web
    image: sfai/web:dev
    container_name: sfai-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles: ["web", "full"]
