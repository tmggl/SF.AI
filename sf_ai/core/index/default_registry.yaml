# SF.AI — Global Capability Registry (Phase 2 seed)
#
# This file is the source of truth for which domains exist, which intents
# they expose, and what status they hold. Phase 3 will move richer lexicons
# to `resources/lexicons/*.yaml`; this registry stays a thin global index.
#
# Status values:
#   active        — fully wired and reachable end-to-end
#   skeleton_only — registered but not implemented (must not be dispatched)
#   planned       — listed for transparency only
#   disabled      — explicitly turned off
#
# requires_safety: domain handles sensitive content. A safety flag must be
# raised on the routing result before responding.

